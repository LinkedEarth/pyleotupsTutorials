name: pyleotups
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      - pytest
      - pandas
      - requests
      - pybtex
      - tqdm
      - numpy
      - pandas
      - bibtextparser
      - doi2bib
      - git+https://github.com/LinkedEarth/pyleotups.git@main
      - git+https://github.com/LinkedEarth/pylipd.git@main
      - git+https://github.com/LinkedEarth/pyleoclim_utils.git@master
